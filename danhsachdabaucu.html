<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách đã bầu cử</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --orange: #f05a1a;
            --orange-light: #fff0ea;
            --green: #16a34a;
            --green-light: #dcfce7;
            --gray-bg: #f4f6fb;
            --gray-border: #e5e9f2;
            --gray-text: #9aa3b5;
            --dark: #1a2240;
            --card-shadow: 0 1px 8px rgba(30, 40, 80, 0.07);
        }

        body {
            font-family: "Be Vietnam Pro", sans-serif;
            background: var(--gray-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 12px 40px;
        }

        .phone-frame {
            width: 100%;
            max-width: 390px;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 8px 40px rgba(30, 40, 80, 0.13);
            overflow: hidden;
            min-height: 88vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            padding: 20px 16px 16px;
            background: #fff;
            border-bottom: 1.5px solid var(--gray-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .btn-back {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 10px 4px 0;
            display: flex;
            align-items: center;
            color: var(--dark);
            transition: opacity 0.15s;
        }

        .btn-back:hover {
            opacity: 0.6;
        }

        .header h1 {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            color: var(--dark);
            margin-right: 34px;
        }

        /* ── Search ── */
        .search-area {
            padding: 16px 16px 10px;
            background: #fff;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap .icon-left {
            position: absolute;
            left: 14px;
            color: var(--orange);
            display: flex;
        }

        .input-wrap .icon-right {
            position: absolute;
            right: 14px;
            color: var(--gray-text);
            display: flex;
            cursor: pointer;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 42px 13px 42px;
            border: 1.5px solid var(--gray-border);
            border-radius: 14px;
            font-family: "Be Vietnam Pro", sans-serif;
            font-size: 14px;
            color: var(--dark);
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(240, 90, 26, 0.1);
        }

        .input-wrap input::placeholder {
            color: var(--gray-text);
        }

        /* ── Stats ── */
        .stats-bar {
            padding: 8px 16px 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-label {
            font-size: 13px;
            color: var(--gray-text);
        }

        .stats-count {
            font-size: 13px;
            font-weight: 700;
            color: var(--orange);
        }

        /* ── List ── */
        .voter-list {
            flex: 1;
            padding: 8px 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        /* ── Card ── */
        .voter-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #fff;
            border-radius: 16px;
            padding: 14px 14px;
            border: 1.5px solid var(--gray-border);
            box-shadow: var(--card-shadow);
            transition: border-color 0.18s, box-shadow 0.18s, transform 0.12s;
            -webkit-tap-highlight-color: transparent;
        }

        .voter-card:hover {
            border-color: #d1d5db;
            box-shadow: 0 4px 18px rgba(30, 40, 80, 0.1);
            transform: translateY(-1px);
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--orange-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info {
            flex: 1;
            min-width: 0;
        }

        .info-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 3px;
        }

        .name {
            font-size: 14.5px;
            font-weight: 700;
            color: var(--dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-voted {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--green);
            background: var(--green-light);
            border: 1px solid rgba(22, 163, 74, 0.25);
            border-radius: 20px;
            padding: 3px 9px;
            white-space: nowrap;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
        }

        .address {
            font-size: 12.5px;
            color: var(--gray-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .vote-time {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--orange);
            font-weight: 600;
        }

        /* ── Empty state ── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px 20px;
            color: var(--gray-text);
        }

        .empty-state svg {
            opacity: 0.35;
        }

        .empty-state p {
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 440px) {
            body {
                padding: 0;
            }

            .phone-frame {
                border-radius: 0;
                min-height: 100vh;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div class="phone-frame">

        <!-- Header -->
        <div class="header">
            <button class="btn-back" onclick="history.back()" aria-label="Quay lại">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18l-6-6 6-6" stroke="#1A2240" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h1>Danh sách đã bầu cử</h1>
        </div>

        <!-- Search -->
        <div class="search-area">
            <div class="input-wrap">
                <span class="icon-left">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#F05A1A" stroke-width="2"
                            stroke-linecap="round" />
                        <circle cx="12" cy="7" r="4" stroke="#F05A1A" stroke-width="2" />
                    </svg>
                </span>
                <input type="text" id="searchName" placeholder="Nhập họ tên" oninput="onSearch()" />
                <span class="icon-right" onclick="onSearch()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="8" stroke="#9AA3B5" stroke-width="2" />
                        <path d="M21 21l-4.35-4.35" stroke="#9AA3B5" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <span class="stats-label">Tổng:</span>
            <span class="stats-count" id="totalCount">0</span>
            <span class="stats-label">người đã bầu</span>
        </div>

        <!-- List -->
        <div class="voter-list" id="voterList"></div>

    </div>

    <script>
        // ─── FAKE DATA ────────────────────────────────────────────────────────────────
        const voters = [
            { id: 1, hoten: "Nguyễn Văn An", noithuongtru: "123 Đường Lê Lợi, Quận 1, TP.HCM", dabau: true, thoigianbau: "08:30" },
            { id: 2, hoten: "Lê Hoàng Cường", noithuongtru: "789 Đường CMT8, Quận 3, TP.HCM", dabau: true, thoigianbau: "09:15" },
            { id: 3, hoten: "Vũ Thu Hà", noithuongtru: "101 Đường Đồng Khởi, Quận 1, TP.HCM", dabau: true, thoigianbau: "10:45" },
            { id: 4, hoten: "Phan Văn Nam", noithuongtru: "22 Võ Văn Kiệt, Quận 5, TP.HCM", dabau: true, thoigianbau: "14:20" },
            { id: 5, hoten: "Ngô Thị Yến", noithuongtru: "54 Nguyễn Đình Chiểu, Quận 3, TP.HCM", dabau: true, thoigianbau: "15:30" },
            { id: 6, hoten: "Đặng Thị Kim Liên", noithuongtru: "22 Đường Hai Bà Trưng, Quận 1, TP.HCM", dabau: true, thoigianbau: "07:50" },
            { id: 7, hoten: "Đinh Quốc Thắng", noithuongtru: "5 Đường Nguyễn Thị Minh Khai, Quận 1", dabau: true, thoigianbau: "11:00" },
            { id: 8, hoten: "Mai Thanh Xuân", noithuongtru: "67 Đường Cách Mạng Tháng 8, Quận 10", dabau: true, thoigianbau: "13:05" },
        ];

        let filtered = [...voters];

        // ─── RENDER ───────────────────────────────────────────────────────────────────
        function renderList(data) {
            const list = document.getElementById("voterList");
            document.getElementById("totalCount").textContent = data.length;

            if (data.length === 0) {
                list.innerHTML = `
            <div class="empty-state">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="8" stroke="#9AA3B5" stroke-width="1.5"/>
                <path d="M21 21l-4.35-4.35" stroke="#9AA3B5" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <p>Không tìm thấy cử tri<br>phù hợp với từ khoá.</p>
            </div>`;
                return;
            }

            list.innerHTML = data.map(v => `
          <div class="voter-card">
            <div class="avatar">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#F05A1A" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="7" r="4" stroke="#F05A1A" stroke-width="2"/>
              </svg>
            </div>
            <div class="info">
              <div class="info-top">
                <div class="name">${v.hoten}</div>
                <div class="badge-voted">
                  <span class="badge-dot"></span> ĐÃ BẦU
                </div>
              </div>
              <div class="address">${v.noithuongtru}</div>
              <div class="vote-time">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" stroke="#F05A1A" stroke-width="2"/>
                  <path d="M12 7v5l3 3" stroke="#F05A1A" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Thời gian bầu: ${v.thoigianbau}
              </div>
            </div>
          </div>
        `).join("");
        }

        // ─── SEARCH ───────────────────────────────────────────────────────────────────
        function onSearch() {
            const name = document.getElementById("searchName").value.trim().toLowerCase();
            filtered = voters.filter(v =>
                !name || (v.hoten || "").toLowerCase().includes(name)
            );
            renderList(filtered);
        }

        // ─── INIT ─────────────────────────────────────────────────────────────────────
        renderList(voters);
    </script>
</body>

</html>
